<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A01028"/>
      <stop offset="100%" stop-color="#7A0C1E"/>
    </linearGradient>
  </defs>

  <!-- Outer dark border -->
  <path d="M100,8 L184,78 Q186,80 184,82 L100,212 Q98,214 96,212 L16,82 Q14,80 16,78 Z" fill="#1A1A1A" stroke="#111" stroke-width="2"/>

  <!-- Mid border (dark gray bevel) -->
  <path d="M100,18 L176,80 L100,202 L24,80 Z" fill="#2A2A2A"/>

  <!-- Inner dark border -->
  <path d="M100,25 L170,82 L100,195 L30,82 Z" fill="#333"/>

  <!-- Main crimson shield body -->
  <path d="M100,32 L164,84 L100,188 L36,84 Z" fill="url(#shieldFill)"/>

  <!-- Inner crimson border line -->
  <path d="M100,42 L156,86 L100,180 L44,86 Z" fill="none" stroke="#6A0A18" stroke-width="2.5"/>

  <!-- S letter - dark outline layer -->
  <text x="100" y="105" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="#0D0000" stroke="#0D0000" stroke-width="8" stroke-linejoin="round" paint-order="stroke">S</text>
  <!-- S letter - dark fill -->
  <text x="100" y="105" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="#1A0505">S</text>

  <!-- P letter - dark outline layer -->
  <text x="100" y="162" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="#0D0000" stroke="#0D0000" stroke-width="8" stroke-linejoin="round" paint-order="stroke">P</text>
  <!-- P letter - dark fill -->
  <text x="100" y="162" font-family="Impact, 'Arial Black', 'Helvetica Neue', sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="#1A0505">P</text>
</svg>
